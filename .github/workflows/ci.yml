name: Test with Python versions
env:
  CLONE_PATH:    ${{ github.workspace }}

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on:
      ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Setup Python with tox
        shell: bash
        run: $CLONE_PATH/.github/workflows/install_tox.sh
      - name: Lint with ruff
        run: |
          # stop the build if there are Python syntax errors or undefined names
          ruff check --output-format=github --select=E9,F63,F7,F82 --exclude=illustration-examples,reference_code .
          # default set of ruff rules with GitHub Annotations
          ruff check --output-format=github --exclude=illustration-examples,reference_code,tests .
      - name: Run test suite
        run: tox -r -e nocoverage